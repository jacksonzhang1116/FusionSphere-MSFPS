<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GNSS 实时定位（百度地图）</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#0f1b33;
      --muted:rgba(255,255,255,.68);
      --text:rgba(255,255,255,.92);
      --line:rgba(255,255,255,.10);
      --good:#35d07f;
      --warn:#ffcc66;
      --bad:#ff6b6b;
      --accent:#5aa7ff;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 16px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 800px at 70% 10%, rgba(90,167,255,.18), transparent 55%),
                  radial-gradient(1000px 700px at 10% 80%, rgba(53,208,127,.14), transparent 55%),
                  var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Arial;
    }

    .app{
      min-height:100%;
      padding: 18px;
      display:grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 14px;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .mapWrap{
      display:flex;
      flex-direction:column;
      min-height: 78vh;
    }
    #map{
      height: 100%;
      min-height: 78vh;
      width: 100%;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .title{
      display:flex;
      gap:10px;
      align-items:baseline;
    }
    .title h1{
      margin:0;
      font-size: 16px;
      letter-spacing: .3px;
      font-weight: 700;
    }
    .title .sub{
      font-size: 12px;
      color: var(--muted);
    }

    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius: 999px;
      border:1px solid var(--line);
      color: var(--muted);
      display:flex;
      gap:8px;
      align-items:center;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background: var(--bad);
      box-shadow: 0 0 0 3px rgba(255,107,107,.15);
    }
    .dot.ok{
      background: var(--good);
      box-shadow: 0 0 0 3px rgba(53,208,127,.15);
    }

    .panel{
      display:flex;
      flex-direction:column;
      gap: 14px;
    }

    .section{
      padding: 14px;
    }
    .section h2{
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: .3px;
      color: rgba(255,255,255,.85);
      font-weight: 700;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric{
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.12);
    }
    .metric .k{
      font-size:12px;
      color: var(--muted);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 8px;
    }
    .metric .v{
      margin-top:6px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .2px;
      color: var(--text);
    }
    .badge{
      font-size:11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: rgba(255,255,255,.78);
      background: rgba(255,255,255,.06);
      white-space:nowrap;
    }
    .badge.good{ border-color: rgba(53,208,127,.35); color: rgba(53,208,127,.95); }
    .badge.warn{ border-color: rgba(255,204,102,.35); color: rgba(255,204,102,.95); }
    .badge.bad { border-color: rgba(255,107,107,.35); color: rgba(255,107,107,.95); }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      letter-spacing: .1px;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
      margin-top: 6px;
    }
    .btn{
      appearance:none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.9);
      padding: 9px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight: 700;
      font-size: 12px;
    }
    .btn:hover{ border-color: rgba(90,167,255,.45); }
    .btn.primary{
      border-color: rgba(90,167,255,.45);
      background: rgba(90,167,255,.18);
    }
    .btn.danger{
      border-color: rgba(255,107,107,.45);
      background: rgba(255,107,107,.14);
    }

    .footer{
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      display:flex;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
    }

    @media (max-width: 980px){
      .app{ grid-template-columns: 1fr; }
      #map{ min-height: 58vh; }
      .mapWrap{ min-height: 58vh; }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- 左侧：地图 -->
    <div class="card mapWrap">
      <div class="topbar">
        <div class="title">
          <h1>GNSS 实时定位</h1>
          <div class="sub">CPU → Node(WebSocket) → Web</div>
        </div>
        <div class="pill" title="WebSocket 数据状态">
          <span id="connDot" class="dot"></span>
          <span id="connText">未连接</span>
        </div>
      </div>
      <div id="map"></div>
      <div class="footer">
        <div>坐标：<span class="mono">WGS84 → BD-09</span></div>
        <div>最近更新：<span id="lastSeen">-</span></div>
      </div>
    </div>

    <!-- 右侧：状态面板 -->
    <div class="panel">
      <div class="card">
        <div class="section">
          <h2>定位状态</h2>
          <div class="grid" id="metrics"></div>

          <div class="controls">
            <button class="btn primary" id="btnFollow">跟随：开</button>
            <button class="btn" id="btnCenter">回到当前位置</button>
            <button class="btn danger" id="btnClear">清空轨迹</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section">
          <h2>提示</h2>
          <div style="color:var(--muted);line-height:1.6;font-size:12px">
            <div>1) 若点位偏移属于正常现象：百度地图使用 BD-09 坐标系，本页面已将 WGS84 自动转换。</div>
            <div>2) SNR 依赖 GSV 语句；若模块未输出或 SNR 字段为空，SNR 会显示为 “-”。</div>
            <div>3) DOP 越小代表卫星几何越好；SV 越大通常越稳定。</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ====== UI & util ======
    const connDot  = document.getElementById("connDot");
    const connText = document.getElementById("connText");
    const lastSeen = document.getElementById("lastSeen");
    const metrics  = document.getElementById("metrics");

    let follow = true;
    let lastBdPt = null;

    function fmt(x, digits = 2) {
      if (x === null || x === undefined) return "-";
      if (typeof x === "number") return x.toFixed(digits);
      return String(x);
    }
    function badgeForDop(x){
      if (x === null || x === undefined) return {t:"-", c:""};
      if (x < 1.5) return {t:"优秀", c:"good"};
      if (x < 3.0) return {t:"良好", c:"warn"};
      return {t:"较差", c:"bad"};
    }
    function badgeForSnr(x){
      if (x === null || x === undefined) return {t:"-", c:""};
      if (x >= 35) return {t:"很好", c:"good"};
      if (x >= 28) return {t:"正常", c:"warn"};
      return {t:"偏弱", c:"bad"};
    }
    function badgeForSv(x){
      if (x === null || x === undefined) return {t:"-", c:""};
      if (x >= 15) return {t:"充足", c:"good"};
      if (x >= 8)  return {t:"可用", c:"warn"};
      return {t:"偏少", c:"bad"};
    }

    function metricCard(label, value, badge){
      const b = badge ? `<span class="badge ${badge.c||""}">${badge.t}</span>` : "";
      return `
        <div class="metric">
          <div class="k">${label}${b}</div>
          <div class="v mono">${value}</div>
        </div>
      `;
    }

    function render(o){
      const snr = o.snr || {};
      const dop = o.dop || {};
      const snrAvg = snr.avg ?? null;

      metrics.innerHTML =
        metricCard("纬度 Lat", fmt(o.lat, 8)) +
        metricCard("经度 Lon", fmt(o.lon, 8)) +
        metricCard("高程 Alt(m)", fmt(o.alt, 2)) +
        metricCard("卫星数 SV", fmt(o.sv, 0), badgeForSv(o.sv ?? null)) +
        metricCard("SNR(avg)", fmt(snrAvg, 2), badgeForSnr(snrAvg)) +
        metricCard("PDOP", fmt(dop.pdop ?? null, 2), badgeForDop(dop.pdop ?? null)) +
        metricCard("HDOP", fmt(dop.hdop ?? null, 2), badgeForDop(dop.hdop ?? null)) +
        metricCard("VDOP", fmt(dop.vdop ?? null, 2), badgeForDop(dop.vdop ?? null));
    }

    function setConnected(ok, text){
      connDot.className = "dot" + (ok ? " ok" : "");
      connText.textContent = text;
    }

    // ====== 百度地图初始化 ======
    let map, marker, polyline;
    let track = []; // BD-09 points

    function initMap() {
      map = new BMap.Map("map");
      const initPt = new BMap.Point(120.9577, 31.4105);
      map.centerAndZoom(initPt, 17);
      map.enableScrollWheelZoom(true);

      marker = new BMap.Marker(initPt);
      map.addOverlay(marker);

      polyline = new BMap.Polyline([], {
        strokeColor: "#5aa7ff",
        strokeWeight: 4,
        strokeOpacity: 0.85
      });
      map.addOverlay(polyline);

      // 控制按钮
      document.getElementById("btnFollow").onclick = () => {
        follow = !follow;
        document.getElementById("btnFollow").textContent = "跟随：" + (follow ? "开" : "关");
      };
      document.getElementById("btnCenter").onclick = () => {
        if (lastBdPt) map.panTo(lastBdPt);
      };
      document.getElementById("btnClear").onclick = () => {
        track = [];
        polyline.setPath(track);
      };
    }

    // WGS84(GPS) -> BD09
    function wgs84ToBd09(lon, lat, cb) {
      const ggPoint = new BMap.Point(lon, lat);
      const convertor = new BMap.Convertor();
      convertor.translate([ggPoint], 1, 5, function (data) {
        if (data.status === 0 && data.points && data.points.length > 0) {
          cb(data.points[0]);
        }
      });
    }

    // ====== WebSocket ======
    setConnected(false, "未连接");
    const ws = new WebSocket("ws://localhost:8080");

    ws.onopen = () => setConnected(true, "已连接");
    ws.onclose = () => setConnected(false, "已断开");
    ws.onerror = () => setConnected(false, "错误");

    ws.onmessage = (ev) => {
      let o;
      try { o = JSON.parse(ev.data); } catch { return; }

      render(o);

      const now = new Date();
      lastSeen.textContent = now.toLocaleTimeString();

      if (!map || !marker) return;
      if (typeof o.lat !== "number" || typeof o.lon !== "number") return;

      wgs84ToBd09(o.lon, o.lat, function (bdPt) {
        lastBdPt = bdPt;
        marker.setPosition(bdPt);

        // 轨迹：避免同一点重复刷（阈值约 0.3m~1m 量级，保守些）
        const n = track.length;
        if (n === 0) {
          track.push(bdPt);
          polyline.setPath(track);
        } else {
          const last = track[n - 1];
          const dx = Math.abs(last.lng - bdPt.lng);
          const dy = Math.abs(last.lat - bdPt.lat);
          if (dx + dy > 0.000002) { // 简单阈值，防止抖动刷屏
            track.push(bdPt);
            if (track.length > 3000) track.shift(); // 防止无限增长
            polyline.setPath(track);
          }
        }

        if (follow) map.panTo(bdPt);
      });
    };

    // 若 3 秒无更新，提示失联
    let lastTick = Date.now();
    ws.addEventListener("message", () => { lastTick = Date.now(); });
    setInterval(() => {
      const dt = Date.now() - lastTick;
      if (dt > 3000) setConnected(false, "未更新");
    }, 800);
  </script>

  <!-- 百度地图 JS API：把你的 AK 填到这里 -->
  <script src="https://api.map.baidu.com/api?v=3.0&ak=Q0mBCLb2Ls8mYF28kaob5iRleRn4bzPP&callback=initMap"></script>
</body>
</html>
